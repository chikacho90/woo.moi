name: Auto-merge Claude PRs

on:
  push:
    branches:
      - 'claude/**'

jobs:
  create-and-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Create PR and merge
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');

            // Check for existing open PR from this branch
            const { data: existing } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              base: 'main',
              state: 'open',
            });

            let pr;
            if (existing.length > 0) {
              pr = existing[0];
              console.log(`Found existing PR #${pr.number}`);
            } else {
              // Create PR
              const { data: created } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Auto-merge: ${branch}`,
                head: branch,
                base: 'main',
                body: `Automated PR from \`${branch}\`.`,
              });
              pr = created;
              console.log(`Created PR #${pr.number}`);
            }

            // Squash merge
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              merge_method: 'squash',
            });
            console.log(`Merged PR #${pr.number}`);
